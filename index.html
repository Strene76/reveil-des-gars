<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de Repas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --accent: #c8522a;
    --accent2: #e8a87c;
    --text: #1a1208;
    --muted: #8a7d6b;
    --border: #e8dfd0;
    --tag-bg: #f5ede0;
    --week-bg: #fff9f4;
    --shadow: 0 4px 24px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* HEADER */
  header {
    background: var(--accent);
    padding: 36px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -30px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: #fff;
    letter-spacing: -0.5px;
    position: relative;
  }
  header p {
    color: rgba(255,255,255,0.75);
    font-size: 0.9rem;
    margin-top: 6px;
    font-weight: 300;
    position: relative;
  }

  /* TABS */
  .tabs {
    display: flex;
    max-width: 600px;
    margin: 24px auto 0;
    gap: 8px;
    padding: 0 16px;
  }
  .tab {
    flex: 1;
    padding: 11px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* CONTENT */
  .content { max-width: 600px; margin: 0 auto; padding: 20px 16px; }

  /* === REPAS ALÉATOIRE === */
  .random-section { display: none; }
  .random-section.visible { display: block; }

  .meal-card {
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: slideUp 0.35s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .meal-card-header {
    background: linear-gradient(135deg, var(--accent) 0%, #d4693e 100%);
    padding: 24px 24px 20px;
    color: #fff;
  }
  .meal-category {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 6px;
  }
  .meal-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    line-height: 1.2;
  }
  .meal-meta {
    display: flex;
    gap: 16px;
    margin-top: 12px;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.82rem;
    opacity: 0.85;
  }
  .meta-item span { font-size: 1rem; }

  .meal-body { padding: 20px 24px 24px; }

  .ingredients-title {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .ingredients-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  .ingredient-tag {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.82rem;
    color: var(--text);
  }

  .btn-generate {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    margin-top: 16px;
    padding: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-generate:hover { background: #b54522; transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }

  .btn-icon { font-size: 1.2rem; transition: transform 0.4s; }
  .btn-generate:hover .btn-icon { transform: rotate(180deg); }

  /* MEAL TYPE SELECTOR */
  .meal-type-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .meal-type-btn {
    flex: 1;
    padding: 9px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .meal-type-btn.active {
    border-color: var(--accent2);
    color: var(--accent);
    background: #fff5ee;
  }

  /* === PLANNING SEMAINE === */
  .week-section { display: none; }
  .week-section.visible { display: block; }

  .week-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .week-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
  }
  .btn-week {
    padding: 10px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-week:hover { background: #b54522; }

  .week-grid { display: flex; flex-direction: column; gap: 10px; }

  .day-card {
    background: var(--card);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: slideUp 0.35s ease both;
  }
  .day-card:nth-child(1) { animation-delay: 0.02s; }
  .day-card:nth-child(2) { animation-delay: 0.05s; }
  .day-card:nth-child(3) { animation-delay: 0.08s; }
  .day-card:nth-child(4) { animation-delay: 0.11s; }
  .day-card:nth-child(5) { animation-delay: 0.14s; }
  .day-card:nth-child(6) { animation-delay: 0.17s; }
  .day-card:nth-child(7) { animation-delay: 0.20s; }

  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--week-bg);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .day-name {
    font-weight: 500;
    font-size: 0.95rem;
  }
  .day-toggle { color: var(--muted); font-size: 0.8rem; }

  .day-meals {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .day-meal-row {
    display: flex;
    gap: 10px;
  }
  .day-meal-slot {
    flex: 1;
    background: var(--tag-bg);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .slot-label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .slot-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--text);
    line-height: 1.3;
  }
  .slot-time {
    font-size: 0.75rem;
    color: var(--accent);
    margin-top: 3px;
  }
  .slot-ingredients {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.4;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
  }
  .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.95rem; }

  /* LOADER */
  .spinning { animation: spin 0.6s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>🍽️ Générateur de Repas</h1>
  <p>Trouvez l'inspiration pour chaque repas</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('random')">🎲 Repas aléatoire</button>
  <button class="tab" onclick="switchTab('week')">📅 Planning semaine</button>
</div>

<div class="content">

  <!-- ONGLET ALÉATOIRE -->
  <div class="random-section visible" id="randomSection">
    <div class="meal-type-selector">
      <button class="meal-type-btn active" onclick="selectMealType(this, 'all')">Tous</button>
      <button class="meal-type-btn" onclick="selectMealType(this, 'lunch')">🌞 Déjeuner</button>
      <button class="meal-type-btn" onclick="selectMealType(this, 'dinner')">🌙 Dîner</button>
    </div>

    <div id="randomCard">
      <div class="empty-state">
        <div class="emoji">🎲</div>
        <p>Cliquez pour générer un repas aléatoire !</p>
      </div>
    </div>

    <button class="btn-generate" onclick="generateRandom()">
      <span class="btn-icon" id="genIcon">✦</span>
      Générer un repas
    </button>
  </div>

  <!-- ONGLET SEMAINE -->
  <div class="week-section" id="weekSection">
    <div class="week-header">
      <h2>Planning de la semaine</h2>
      <button class="btn-week" onclick="generateWeek()">🔄 Générer</button>
    </div>

    <div class="week-grid" id="weekGrid">
      <div class="empty-state">
        <div class="emoji">📅</div>
        <p>Générez votre planning pour la semaine !</p>
      </div>
    </div>
  </div>

</div>

<script>
// =====================
//  BASE DE DONNÉES
// =====================
const meals = [
  // Déjeuners
  { name: "Poulet rôti aux herbes", type: "lunch", time: "45 min", ingredients: ["Poulet", "Herbes de Provence", "Ail", "Citron", "Pommes de terre"] },
  { name: "Quiche Lorraine", type: "lunch", time: "50 min", ingredients: ["Pâte brisée", "Lardons", "Œufs", "Crème", "Gruyère"] },
  { name: "Risotto aux champignons", type: "lunch", time: "35 min", ingredients: ["Riz arborio", "Champignons", "Parmesan", "Oignon", "Bouillon"] },
  { name: "Salade Niçoise", type: "lunch", time: "15 min", ingredients: ["Thon", "Œufs", "Tomates", "Olives", "Haricots verts"] },
  { name: "Gratin dauphinois", type: "lunch", time: "60 min", ingredients: ["Pommes de terre", "Crème", "Gruyère", "Ail", "Noix de muscade"] },
  { name: "Tarte aux légumes", type: "lunch", time: "45 min", ingredients: ["Pâte brisée", "Courgettes", "Poivrons", "Fromage", "Œufs"] },
  { name: "Sole meunière", type: "lunch", time: "20 min", ingredients: ["Sole", "Beurre", "Citron", "Farine", "Persil"] },
  { name: "Croque-monsieur", type: "lunch", time: "15 min", ingredients: ["Pain de mie", "Jambon", "Gruyère", "Béchamel", "Beurre"] },
  { name: "Lasagnes bolognaise", type: "lunch", time: "75 min", ingredients: ["Pâtes lasagnes", "Bœuf haché", "Tomates", "Béchamel", "Parmesan"] },
  { name: "Omelette aux fines herbes", type: "lunch", time: "10 min", ingredients: ["Œufs", "Ciboulette", "Estragon", "Beurre", "Sel"] },
  // Dîners
  { name: "Velouté de potiron", type: "dinner", time: "30 min", ingredients: ["Potiron", "Crème", "Oignon", "Bouillon", "Muscade"] },
  { name: "Dos de cabillaud vapeur", type: "dinner", time: "20 min", ingredients: ["Cabillaud", "Légumes vapeur", "Citron", "Aneth", "Beurre"] },
  { name: "Poêlée de légumes", type: "dinner", time: "20 min", ingredients: ["Courgettes", "Poivrons", "Aubergines", "Huile d'olive", "Herbes"] },
  { name: "Soupe de lentilles", type: "dinner", time: "35 min", ingredients: ["Lentilles", "Carottes", "Céleri", "Cumin", "Tomates"] },
  { name: "Filet de saumon teriyaki", type: "dinner", time: "25 min", ingredients: ["Saumon", "Sauce soja", "Miel", "Gingembre", "Sésame"] },
  { name: "Oeufs cocotte", type: "dinner", time: "15 min", ingredients: ["Œufs", "Crème", "Jambon", "Emmental", "Sel & poivre"] },
  { name: "Minestrone", type: "dinner", time: "40 min", ingredients: ["Pâtes", "Tomates", "Haricots", "Carottes", "Basilic"] },
  { name: "Tartines avocat crevettes", type: "dinner", time: "10 min", ingredients: ["Pain complet", "Avocat", "Crevettes", "Citron", "Coriandre"] },
  { name: "Taboulé libanais", type: "dinner", time: "20 min", ingredients: ["Boulgour", "Tomates", "Persil", "Menthe", "Citron"] },
  { name: "Poisson à la provençale", type: "dinner", time: "35 min", ingredients: ["Poisson blanc", "Tomates", "Olives", "Herbes", "Ail"] },
  // Les deux
  { name: "Steak haché & frites maison", type: "all", time: "30 min", ingredients: ["Bœuf haché", "Pommes de terre", "Ketchup", "Moutarde", "Salade"] },
  { name: "Pâtes carbonara", type: "all", time: "20 min", ingredients: ["Spaghettis", "Lardons", "Œufs", "Parmesan", "Poivre"] },
  { name: "Pizza maison", type: "all", time: "40 min", ingredients: ["Pâte à pizza", "Coulis tomate", "Mozzarella", "Jambon", "Basilic"] },
  { name: "Burger maison", type: "all", time: "25 min", ingredients: ["Pain burger", "Steak haché", "Tomate", "Salade", "Cheddar"] },
  { name: "Tajine de poulet", type: "all", time: "60 min", ingredients: ["Poulet", "Citron confit", "Olives", "Oignons", "Épices"] },
  { name: "Wok de légumes au tofu", type: "all", time: "20 min", ingredients: ["Tofu", "Pousses de soja", "Poivrons", "Sauce soja", "Gingembre"] },
  { name: "Hachis Parmentier", type: "all", time: "55 min", ingredients: ["Bœuf haché", "Purée", "Oignons", "Tomates", "Gruyère"] },
  { name: "Ratatouille", type: "all", time: "50 min", ingredients: ["Courgettes", "Aubergines", "Poivrons", "Tomates", "Herbes de Provence"] },
];

const days = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];

let currentFilter = 'all';

// =====================
//  NAVIGATION
// =====================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'random') || (i === 1 && tab === 'week'));
  });
  document.getElementById('randomSection').classList.toggle('visible', tab === 'random');
  document.getElementById('weekSection').classList.toggle('visible', tab === 'week');
}

function selectMealType(btn, type) {
  document.querySelectorAll('.meal-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = type;
}

// =====================
//  REPAS ALÉATOIRE
// =====================
function getFilteredMeals() {
  if (currentFilter === 'all') return meals;
  return meals.filter(m => m.type === currentFilter || m.type === 'all');
}

function generateRandom() {
  const icon = document.getElementById('genIcon');
  icon.classList.add('spinning');

  setTimeout(() => {
    const pool = getFilteredMeals();
    const meal = pool[Math.floor(Math.random() * pool.length)];
    renderRandomCard(meal);
    icon.classList.remove('spinning');
  }, 400);
}

function renderRandomCard(meal) {
  const typeLabel = meal.type === 'lunch' ? '🌞 Déjeuner' : meal.type === 'dinner' ? '🌙 Dîner' : '🍴 Repas';
  const tagsHTML = meal.ingredients.map(i => `<span class="ingredient-tag">${i}</span>`).join('');

  document.getElementById('randomCard').innerHTML = `
    <div class="meal-card">
      <div class="meal-card-header">
        <div class="meal-category">${typeLabel}</div>
        <div class="meal-name">${meal.name}</div>
        <div class="meal-meta">
          <div class="meta-item"><span>⏱</span> ${meal.time}</div>
          <div class="meta-item"><span>🥗</span> ${meal.ingredients.length} ingrédients</div>
        </div>
      </div>
      <div class="meal-body">
        <div class="ingredients-title">Ingrédients</div>
        <div class="ingredients-grid">${tagsHTML}</div>
      </div>
    </div>
  `;
}

// =====================
//  PLANNING SEMAINE
// =====================
function generateWeek() {
  const lunchPool = meals.filter(m => m.type === 'lunch' || m.type === 'all');
  const dinnerPool = meals.filter(m => m.type === 'dinner' || m.type === 'all');

  let used = new Set();

  function pick(pool) {
    let candidates = pool.filter(m => !used.has(m.name));
    if (candidates.length === 0) { used.clear(); candidates = pool; }
    const chosen = candidates[Math.floor(Math.random() * candidates.length)];
    used.add(chosen.name);
    return chosen;
  }

  const html = days.map((day, i) => {
    const lunch = pick(lunchPool);
    const dinner = pick(dinnerPool);
    return `
      <div class="day-card" style="animation-delay:${i * 0.03}s">
        <div class="day-header">
          <span class="day-name">${day}</span>
          <span class="day-toggle">2 repas</span>
        </div>
        <div class="day-meals">
          <div class="day-meal-row">
            <div class="day-meal-slot">
              <div class="slot-label">🌞 Déjeuner</div>
              <div class="slot-name">${lunch.name}</div>
              <div class="slot-time">⏱ ${lunch.time}</div>
              <div class="slot-ingredients">${lunch.ingredients.slice(0,3).join(', ')}…</div>
            </div>
            <div class="day-meal-slot">
              <div class="slot-label">🌙 Dîner</div>
              <div class="slot-name">${dinner.name}</div>
              <div class="slot-time">⏱ ${dinner.time}</div>
              <div class="slot-ingredients">${dinner.ingredients.slice(0,3).join(', ')}…</div>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('weekGrid').innerHTML = html;
}
</script>
</body>
</html>
